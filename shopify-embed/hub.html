<!-- SRT Hub — paste into a Shopify custom page (HTML editor) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  #srt-hub * { box-sizing: border-box; margin: 0; padding: 0; }
  #srt-hub {
    font-family: 'Inter', sans-serif;
    background: #001219;
    color: #fafafa;
    padding: 28px 24px;
    border-radius: 10px;
  }

  /* Header */
  #srt-hub .sh-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  #srt-hub .sh-title-row { display: flex; align-items: center; gap: 10px; }
  #srt-hub .sh-logo {
    width: 34px; height: 34px; background: #c87a41; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0;
  }
  #srt-hub .sh-title { font-size: 17px; font-weight: 700; }
  #srt-hub .sh-sub   { font-size: 11px; color: #8f8d8d; margin-top: 1px; }
  #srt-hub .sh-join-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: #c87a41; color: #fff; border: none; border-radius: 8px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 9px 16px; cursor: pointer; text-decoration: none;
    transition: opacity .15s;
  }
  #srt-hub .sh-join-btn:hover { opacity: .85; }

  /* Search + filters */
  #srt-hub .sh-filters { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  #srt-hub .sh-search-wrap { position: relative; }
  #srt-hub .sh-search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: #8f8d8d; pointer-events: none;
  }
  #srt-hub .sh-search {
    width: 100%; background: #022e4b; border: 1px solid rgba(143,141,141,.25);
    color: #fafafa; font-family: inherit; font-size: 13px;
    padding: 10px 14px 10px 36px; border-radius: 8px; outline: none;
    transition: border-color .15s;
  }
  #srt-hub .sh-search:focus { border-color: #c87a41; }
  #srt-hub .sh-search::placeholder { color: #8f8d8d; }
  #srt-hub .sh-cats { display: flex; flex-wrap: wrap; gap: 6px; }
  #srt-hub .sh-cat-btn {
    background: #022e4b; border: 1px solid rgba(143,141,141,.25);
    color: #8f8d8d; font-family: inherit; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    padding: 5px 12px; border-radius: 6px; cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  #srt-hub .sh-cat-btn:hover { border-color: #c87a41; color: #fafafa; }
  #srt-hub .sh-cat-btn.active { background: rgba(200,122,65,.15); border-color: rgba(200,122,65,.5); color: #c87a41; }

  /* Stats row */
  #srt-hub .sh-stats {
    display: flex; gap: 16px; margin-bottom: 16px;
    font-size: 12px; color: #8f8d8d; font-weight: 600;
  }
  #srt-hub .sh-stats span { color: #c87a41; }

  /* Cards */
  #srt-hub .sh-list { display: flex; flex-direction: column; gap: 10px; }
  #srt-hub .sh-card {
    background: #022e4b; border: 1px solid rgba(143,141,141,.25);
    border-radius: 8px; padding: 16px 18px;
    transition: border-color .15s; cursor: pointer; text-decoration: none; display: block;
  }
  #srt-hub .sh-card:hover { border-color: rgba(200,122,65,.45); }
  #srt-hub .sh-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  #srt-hub .sh-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: #001219; border: 1px solid rgba(143,141,141,.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff; overflow: hidden;
  }
  #srt-hub .sh-avatar img { width: 100%; height: 100%; object-fit: cover; }
  #srt-hub .sh-author { font-size: 12px; font-weight: 600; color: #fafafa; }
  #srt-hub .sh-bot-badge {
    font-size: 9px; font-weight: 800; background: rgba(200,122,65,.2);
    color: #c87a41; border: 1px solid rgba(200,122,65,.4);
    border-radius: 4px; padding: 1px 5px; letter-spacing: .06em;
  }
  #srt-hub .sh-date { font-size: 11px; color: #8f8d8d; margin-left: auto; white-space: nowrap; }
  #srt-hub .sh-cat-pill {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
    padding: 2px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
  }
  #srt-hub .sh-card-title { font-size: 14px; font-weight: 700; line-height: 1.4; color: #fafafa; margin-bottom: 6px; }
  #srt-hub .sh-card-preview { font-size: 12px; color: #8f8d8d; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  #srt-hub .sh-card-footer { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(143,141,141,.15); font-size: 11px; color: #8f8d8d; }

  /* Category pill colors */
  #srt-hub .cp-general       { background: rgba(59,130,246,.15);  color: #93c5fd; border: 1px solid rgba(59,130,246,.3); }
  #srt-hub .cp-ideas         { background: rgba(139,92,246,.15);  color: #c4b5fd; border: 1px solid rgba(139,92,246,.3); }
  #srt-hub .cp-show-and-tell { background: rgba(16,185,129,.15);  color: #6ee7b7; border: 1px solid rgba(16,185,129,.3); }
  #srt-hub .cp-q-a           { background: rgba(245,158,11,.15);  color: #fcd34d; border: 1px solid rgba(245,158,11,.3); }
  #srt-hub .cp-announcements { background: rgba(200,122,65,.15);  color: #fbbf8a; border: 1px solid rgba(200,122,65,.3); }
  #srt-hub .cp-polls         { background: rgba(239,68,68,.15);   color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
  #srt-hub .cp-research      { background: rgba(6,182,212,.15);   color: #67e8f9; border: 1px solid rgba(6,182,212,.3); }
  #srt-hub .cp-academia      { background: rgba(99,102,241,.15);  color: #a5b4fc; border: 1px solid rgba(99,102,241,.3); }
  #srt-hub .cp-hobby         { background: rgba(249,115,22,.15);  color: #fdba74; border: 1px solid rgba(249,115,22,.3); }
  #srt-hub .cp-just-for-fun  { background: rgba(236,72,153,.15);  color: #f9a8d4; border: 1px solid rgba(236,72,153,.3); }
  #srt-hub .cp-default       { background: rgba(143,141,141,.1);  color: #8f8d8d; border: 1px solid rgba(143,141,141,.2); }

  /* Load more */
  #srt-hub .sh-load-more {
    display: block; width: 100%; margin-top: 16px;
    background: none; border: 1px solid rgba(143,141,141,.25);
    color: #8f8d8d; font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 11px; border-radius: 8px; cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  #srt-hub .sh-load-more:hover { border-color: #c87a41; color: #fafafa; }

  /* Empty / loading */
  #srt-hub .sh-empty { text-align: center; padding: 60px 0; color: #8f8d8d; font-size: 14px; }
  #srt-hub .sh-spinner {
    width: 20px; height: 20px; border: 2px solid rgba(143,141,141,.3);
    border-top-color: #c87a41; border-radius: 50%;
    animation: sh-spin .7s linear infinite; display: inline-block;
  }
  @keyframes sh-spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    #srt-hub { padding: 20px 16px; }
    #srt-hub .sh-header { flex-direction: column; align-items: flex-start; }
  }
</style>

<div id="srt-hub">
  <div class="sh-header">
    <div class="sh-title-row">
      <div class="sh-logo">SRT</div>
      <div>
        <div class="sh-title">SRT Hub</div>
        <div class="sh-sub">Community Research</div>
      </div>
    </div>
    <a class="sh-join-btn" href="https://canduki21.github.io/SRT-HUB/" target="_blank" rel="noopener">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
      Join the Hub
    </a>
  </div>

  <div class="sh-filters">
    <div class="sh-search-wrap">
      <svg class="sh-search-icon" width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input class="sh-search" id="sh-search" type="text" placeholder="Search posts…">
    </div>
    <div class="sh-cats" id="sh-cats"></div>
  </div>

  <div class="sh-stats" id="sh-stats"></div>
  <div class="sh-list"  id="sh-list"><div class="sh-empty"><span class="sh-spinner"></span></div></div>
  <button class="sh-load-more" id="sh-load-more" style="display:none">Load more posts</button>
</div>

<script>
(function () {
  const SB_URL = 'https://mtdpaiadnldbvaqmyteg.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10ZHBhaWFkbmxkYnZhcW15dGVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMDI5OTMsImV4cCI6MjA5ODU3ODk5M30.NnhrfI-GAioiylfl5zr8hiYGPAx52dGgpxM2j7htycI';
  const HUB_URL = 'https://canduki21.github.io/SRT-HUB/';
  const PAGE = 10;

  const headers = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

  let allPosts = [], allCats = [], profiles = {};
  let search = '', activecat = 'all', offset = PAGE;

  function api(path) {
    return fetch(SB_URL + '/rest/v1/' + path, { headers }).then(r => r.json());
  }

  function slug(name) {
    return (name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function stripMd(md) {
    return (md || '').replace(/!\[.*?\]\(.*?\)/g, '').replace(/\[([^\]]+)\]\(.*?\)/g, '$1')
      .replace(/#{1,6}\s+/g, '').replace(/(\*\*|__)(.*?)\1/g, '$2').replace(/(\*|_)(.*?)\1/g, '$2')
      .replace(/`[^`]*`/g, '').replace(/>\s+/g, '').replace(/[-*+]\s+/g, '')
      .replace(/\n+/g, ' ').trim();
  }

  function avatar(name) {
    const colors = ['#c87a41','#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#ec4899'];
    const hash = [...(name || '?')].reduce((a, c) => a + c.charCodeAt(0), 0);
    const color = colors[hash % colors.length];
    const letter = (name || '?')[0].toUpperCase();
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30"><rect width="30" height="30" rx="15" fill="${color}"/><text x="15" y="20" font-size="13" font-family="sans-serif" fill="white" text-anchor="middle" font-weight="700">${letter}</text></svg>`;
    return 'data:image/svg+xml;base64,' + btoa(svg);
  }

  function getFiltered() {
    let r = allPosts;
    if (activecat !== 'all') r = r.filter(p => slug(p.category?.name) === activecat);
    if (search) {
      const q = search.toLowerCase();
      r = r.filter(p => (p.title || '').toLowerCase().includes(q) || stripMd(p.body).toLowerCase().includes(q));
    }
    return r;
  }

  function renderCats() {
    const counts = {};
    allPosts.forEach(p => { const k = slug(p.category?.name); counts[k] = (counts[k] || 0) + 1; });
    const el = document.getElementById('sh-cats');
    el.innerHTML = `<button class="sh-cat-btn${activecat === 'all' ? ' active' : ''}" data-cat="all">All (${allPosts.length})</button>` +
      allCats.filter(c => counts[slug(c.name)]).map(c =>
        `<button class="sh-cat-btn${activecat === slug(c.name) ? ' active' : ''}" data-cat="${slug(c.name)}">${c.emoji} ${c.name} (${counts[slug(c.name)] || 0})</button>`
      ).join('');
    el.querySelectorAll('.sh-cat-btn').forEach(btn => btn.addEventListener('click', () => {
      activecat = btn.dataset.cat; offset = PAGE; render();
    }));
  }

  function cardHTML(p) {
    const name = p.author_email || 'Anonymous';
    const prof = Object.values(profiles).find(x => x.username === name);
    const src = prof?.avatar_url || avatar(name);
    const catSlug = slug(p.category?.name);
    const preview = stripMd(p.body);
    const isBot = name === 'SRT';
    return `<a class="sh-card" href="${HUB_URL}" target="_blank" rel="noopener">
      <div class="sh-card-top">
        <div class="sh-avatar"><img src="${src}" alt="${name}" onerror="this.parentNode.textContent='${name[0].toUpperCase()}'"></div>
        <div>
          <div style="display:flex;align-items:center;gap:5px">
            <span class="sh-author">${name}</span>
            ${isBot ? '<span class="sh-bot-badge">BOT</span>' : ''}
          </div>
        </div>
        <span class="sh-date">${fmtDate(p.created_at)}</span>
        <span class="sh-cat-pill cp-${catSlug || 'default'}">${p.category?.emoji || ''} ${p.category?.name || ''}</span>
      </div>
      <div class="sh-card-title">${p.title}</div>
      ${preview ? `<div class="sh-card-preview">${preview}</div>` : ''}
      <div class="sh-card-footer">
        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        ${p.comment_count || 0} comment${p.comment_count !== 1 ? 's' : ''}
        <span style="margin-left:auto;color:#c87a41;font-size:11px;font-weight:600">View on Hub →</span>
      </div>
    </a>`;
  }

  function render() {
    const filtered = getFiltered();
    document.getElementById('sh-stats').innerHTML =
      `<span class="sh-stat-val"><span>${filtered.length}</span> post${filtered.length !== 1 ? 's' : ''}</span>`;

    const page = filtered.slice(0, offset);
    if (!page.length) {
      document.getElementById('sh-list').innerHTML = '<div class="sh-empty">No posts found.</div>';
      document.getElementById('sh-load-more').style.display = 'none';
      return;
    }

    document.getElementById('sh-list').innerHTML = page.map(cardHTML).join('');
    document.getElementById('sh-load-more').style.display = offset < filtered.length ? 'block' : 'none';
  }

  document.getElementById('sh-search').addEventListener('input', e => {
    search = e.target.value; offset = PAGE; render();
  });
  document.getElementById('sh-load-more').addEventListener('click', () => {
    offset += PAGE; render();
  });

  Promise.all([
    api('hub_categories?select=id,name,emoji&order=name'),
    api('hub_posts?select=id,title,body,created_at,author_email,author_id,comment_count:hub_comments(count),category:hub_categories(name,emoji)&order=created_at.desc'),
    api('hub_profiles?select=user_id,username,avatar_url'),
  ]).then(([cats, posts, profs]) => {
    allCats  = cats || [];
    allPosts = (posts || []).map(p => ({ ...p, comment_count: p.comment_count?.[0]?.count ?? 0 }));
    profiles = Object.fromEntries((profs || []).map(p => [p.user_id, p]));
    renderCats();
    render();
  }).catch(() => {
    document.getElementById('sh-list').innerHTML = '<div class="sh-empty">Failed to load posts. Please try again later.</div>';
  });
})();
</script>
