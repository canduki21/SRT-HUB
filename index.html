<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRT Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f5f3ee;
      --surface: #ffffff;
      --sidebar: #ffffff;
      --border:  #e8e4db;
      --accent:  #e8a020;
      --accent-light: rgba(232,160,32,.12);
      --text:    #1a1714;
      --muted:   #7a7267;
      --radius:  10px;
      --shadow:  0 1px 4px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── Layout ── */
    .hub-layout { display:flex; min-height:100vh; }

    /* ── Sidebar ── */
    .hub-sidebar {
      width:250px; background:var(--sidebar); border-right:1px solid var(--border);
      position:fixed; top:0; left:0; height:100vh;
      display:flex; flex-direction:column; padding:20px 16px; gap:4px; z-index:20;
      overflow-y:auto;
    }
    .sidebar-logo {
      display:flex; align-items:center; gap:10px; padding:6px 8px; margin-bottom:12px; cursor:pointer;
    }
    .sidebar-logo-mark {
      width:34px; height:34px; background:var(--accent); border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:13px; color:#fff; flex-shrink:0;
    }
    .sidebar-logo-text { font-weight:700; font-size:16px; color:var(--text); }
    .sidebar-logo-sub  { font-size:10px; color:var(--muted); margin-top:1px; }

    .btn-new-post {
      display:flex; align-items:center; justify-content:center; gap:7px;
      background:var(--accent); color:#fff; border:none; border-radius:var(--radius);
      font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
      padding:11px 16px; width:100%; margin-bottom:8px; transition:opacity .15s;
    }
    .btn-new-post:hover { opacity:.88; }

    .sidebar-divider { height:1px; background:var(--border); margin:8px 0; }

    .sidebar-section { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; padding:4px 8px; margin-top:4px; }

    .hub-cat-btn {
      display:flex; align-items:center; justify-content:space-between;
      background:none; border:none; color:var(--muted);
      font-family:inherit; font-size:13px; font-weight:500;
      padding:8px 10px; border-radius:8px; cursor:pointer; width:100%;
      transition:background .12s, color .12s; text-align:left;
    }
    .hub-cat-btn:hover { background:var(--bg); color:var(--text); }
    .hub-cat-btn.active { background:var(--accent-light); color:var(--accent); font-weight:600; }
    .hub-cat-count { font-size:11px; font-weight:700; background:var(--bg); border-radius:999px; padding:1px 7px; color:var(--muted); }
    .hub-cat-btn.active .hub-cat-count { background:rgba(232,160,32,.2); color:var(--accent); }

    .sidebar-spacer { flex:1; }

    .sidebar-user {
      border-top:1px solid var(--border); padding-top:14px; margin-top:8px;
    }
    .sidebar-user-row {
      display:flex; align-items:center; gap:10px; padding:8px 8px; border-radius:8px;
      cursor:pointer; transition:background .12s;
    }
    .sidebar-user-row:hover { background:var(--bg); }
    .sidebar-user-name { font-size:13px; font-weight:600; color:var(--text); }
    .sidebar-user-link { font-size:11px; color:var(--muted); }
    .sidebar-signout { background:none; border:none; cursor:pointer; font-size:11px; color:var(--muted); font-family:inherit; padding:2px 8px; display:block; width:100%; text-align:left; }
    .sidebar-signout:hover { color:var(--text); }
    .sidebar-signin { display:flex; flex-direction:column; gap:6px; }
    .btn-signin { background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; padding:9px 14px; width:100%; transition:background .12s; }
    .btn-signin:hover { background:var(--border); }

    /* ── Main content ── */
    .hub-content { margin-left:250px; flex:1; padding:28px 28px 60px; max-width:calc(250px + 700px); }

    .hub-topbar { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    .hub-search-wrap { position:relative; flex:1; max-width:400px; }
    .hub-search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
    .hub-search {
      width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text);
      font-family:inherit; font-size:14px; padding:10px 16px 10px 38px; border-radius:var(--radius);
      outline:none; transition:border-color .15s; box-shadow:var(--shadow);
    }
    .hub-search:focus { border-color:var(--accent); }
    .hub-search::placeholder { color:var(--muted); }
    .hub-stats { font-size:12px; color:var(--muted); font-weight:600; }
    .hub-stat-val { color:var(--accent); }

    .view { display:none; }
    .view.active { display:block; }

    /* ── Cards ── */
    .hub-list { display:flex; flex-direction:column; gap:14px; }
    .hub-card {
      background:var(--surface); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:20px 22px; cursor:pointer;
      transition:box-shadow .15s, transform .1s;
    }
    .hub-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.1), 0 0 0 1px rgba(0,0,0,.05); transform:translateY(-1px); }
    .hub-card-top { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .hub-avatar { width:38px; height:38px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--bg); border:1px solid var(--border); }
    .hub-author-name { font-size:13px; font-weight:600; color:var(--text); }
    .hub-author-date { font-size:11px; color:var(--muted); margin-top:1px; }
    .hub-cat-pill {
      font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
      padding:3px 9px; border-radius:5px; white-space:nowrap; margin-left:auto;
    }
    .cat-general       { background:rgba(59,130,246,.1);   color:#2563eb;  border:1px solid rgba(59,130,246,.2); }
    .cat-ideas         { background:rgba(139,92,246,.1);   color:#7c3aed;  border:1px solid rgba(139,92,246,.2); }
    .cat-show-and-tell { background:rgba(16,185,129,.1);   color:#059669;  border:1px solid rgba(16,185,129,.2); }
    .cat-q-a           { background:rgba(245,158,11,.1);   color:#d97706;  border:1px solid rgba(245,158,11,.2); }
    .cat-announcements { background:rgba(232,160,32,.12);  color:#b45309;  border:1px solid rgba(232,160,32,.25); }
    .cat-polls         { background:rgba(239,68,68,.1);    color:#dc2626;  border:1px solid rgba(239,68,68,.2); }
    .cat-research      { background:rgba(6,182,212,.1);    color:#0e7490;  border:1px solid rgba(6,182,212,.2); }
    .cat-academia      { background:rgba(99,102,241,.1);   color:#4338ca;  border:1px solid rgba(99,102,241,.2); }
    .cat-hobby         { background:rgba(249,115,22,.1);   color:#c2410c;  border:1px solid rgba(249,115,22,.2); }
    .cat-just-for-fun  { background:rgba(236,72,153,.1);   color:#be185d;  border:1px solid rgba(236,72,153,.2); }
    .cat-default       { background:rgba(120,114,103,.08); color:#7a7267;  border:1px solid rgba(120,114,103,.15); }

    .hub-card-title-row { display:flex; align-items:flex-start; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
    .hub-card-title { font-size:16px; font-weight:700; line-height:1.4; color:var(--text); }
    .hub-card-body  { font-size:13px; color:var(--muted); line-height:1.65; margin-bottom:14px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .hub-card-img   { width:100%; max-height:300px; object-fit:cover; border-radius:8px; margin-bottom:14px; display:block; border:1px solid var(--border); }
    .hub-card-footer { display:flex; align-items:center; gap:14px; font-size:12px; color:var(--muted); padding-top:12px; border-top:1px solid var(--border); margin-top:4px; }
    .hub-tag { font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; white-space:nowrap; background:rgba(232,160,32,.12); color:#b45309; border:1px solid rgba(232,160,32,.25); flex-shrink:0; }

    .hub-empty { text-align:center; padding:80px 20px; color:var(--muted); }
    .hub-empty h3 { font-size:18px; color:var(--text); margin-bottom:8px; font-weight:700; }
    .hub-empty p  { font-size:14px; }

    /* ── Detail ── */
    .detail-back {
      display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600;
      color:var(--muted); cursor:pointer; margin-bottom:20px; transition:color .15s;
      background:none; border:none; font-family:inherit; padding:0;
    }
    .detail-back:hover { color:var(--text); }
    .detail-header { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; margin-bottom:16px; }
    .detail-meta { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .detail-author-info { flex:1; }
    .detail-title { font-size:22px; font-weight:700; line-height:1.35; color:var(--text); margin-bottom:4px; }
    .detail-body {
      background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow);
      padding:24px; margin-bottom:16px; line-height:1.8; font-size:15px; color:var(--text);
    }
    .detail-body h1,.detail-body h2,.detail-body h3 { margin:20px 0 10px; font-weight:700; }
    .detail-body h1 { font-size:20px; }
    .detail-body h2 { font-size:17px; }
    .detail-body h3 { font-size:15px; }
    .detail-body p  { margin-bottom:14px; color:var(--text); }
    .detail-body a  { color:var(--accent); text-decoration:none; }
    .detail-body a:hover { text-decoration:underline; }
    .detail-body code { background:var(--bg); padding:2px 6px; border-radius:4px; font-family:monospace; font-size:13px; border:1px solid var(--border); }
    .detail-body pre  { background:var(--bg); border:1px solid var(--border); padding:16px; border-radius:var(--radius); overflow-x:auto; margin-bottom:14px; }
    .detail-body pre code { background:none; border:none; padding:0; }
    .detail-body img  { max-width:100%; border-radius:var(--radius); margin:10px 0; border:1px solid var(--border); }
    .detail-body ul,.detail-body ol { padding-left:24px; margin-bottom:14px; }
    .detail-body li  { margin-bottom:4px; }
    .detail-body blockquote { border-left:3px solid var(--accent); padding-left:14px; color:var(--muted); margin-bottom:14px; }

    /* ── Comments ── */
    .comments-section { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; }
    .comments-heading { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:16px; }
    .comment { display:flex; gap:12px; padding:16px 0; border-bottom:1px solid var(--border); }
    .comment:last-of-type { border-bottom:none; }
    .comment-body { flex:1; }
    .comment-meta { font-size:12px; color:var(--muted); margin-bottom:8px; }
    .comment-meta strong { color:var(--text); }
    .comment-text { font-size:14px; line-height:1.65; color:var(--text); }
    .comment-text p { margin-bottom:8px; }
    .comment-text p:last-child { margin-bottom:0; }
    .comment-text code { background:var(--bg); padding:1px 5px; border-radius:3px; font-family:monospace; font-size:12px; border:1px solid var(--border); }
    .comment-reply-btn { background:none; border:none; cursor:pointer; font-size:11px; font-weight:600; color:var(--muted); padding:2px 0; font-family:inherit; transition:color .15s; }
    .comment-reply-btn:hover { color:var(--accent); }
    .comment-replies { margin-top:12px; padding-left:20px; border-left:2px solid var(--border); }
    .reply-form { margin-top:10px; display:none; }
    .reply-form.open { display:block; }
    .reply-textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:13px; padding:10px 12px; border-radius:var(--radius); outline:none; resize:vertical; min-height:72px; line-height:1.5; transition:border-color .15s; }
    .reply-textarea:focus { border-color:var(--accent); }
    .reply-textarea::placeholder { color:var(--muted); }
    .reply-form-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:6px; }
    .comment-form { margin-top:20px; border-top:1px solid var(--border); padding-top:20px; }
    .comment-form-title { font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
    .comment-textarea {
      width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
      font-family:inherit; font-size:14px; padding:12px 14px; border-radius:var(--radius);
      outline:none; resize:vertical; min-height:100px; line-height:1.6; transition:border-color .15s;
    }
    .comment-textarea:focus { border-color:var(--accent); }
    .comment-textarea::placeholder { color:var(--muted); }
    .comment-form-footer { display:flex; justify-content:flex-end; margin-top:10px; }

    .login-prompt {
      background:rgba(232,160,32,.06); border:1px solid rgba(232,160,32,.2);
      border-radius:var(--radius); padding:16px 18px;
      font-size:13px; color:var(--muted); display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:20px;
    }

    /* ── Buttons ── */
    .btn {
      display:inline-flex; align-items:center; gap:7px; border:none; border-radius:var(--radius);
      font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; padding:9px 18px;
      transition:opacity .15s; text-decoration:none;
    }
    .btn:hover { opacity:.85; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-ghost   { background:none; border:1px solid var(--border); color:var(--muted); }
    .btn-ghost:hover { border-color:var(--text); color:var(--text); }
    .btn-sm { padding:6px 14px; font-size:12px; }

    .moon-btn { display:inline-flex; align-items:center; gap:5px; background:var(--bg); border:1px solid var(--border); border-radius:999px; padding:5px 12px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; font-family:inherit; transition:all .15s; }
    .moon-btn:hover { border-color:#a78bfa; color:#7c3aed; }
    .moon-btn.reacted { background:rgba(139,92,246,.08); border-color:#a78bfa; color:#7c3aed; }
    .post-actions { display:flex; gap:8px; margin-left:auto; }
    .action-btn { background:none; border:1px solid var(--border); cursor:pointer; font-size:12px; font-weight:600; color:var(--muted); padding:5px 12px; border-radius:999px; font-family:inherit; transition:all .15s; }
    .action-btn:hover { border-color:var(--text); color:var(--text); }
    .action-btn.delete:hover { border-color:#ef4444; color:#dc2626; }

    /* ── Modals ── */
    .hub-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.4); backdrop-filter:blur(4px); align-items:center; justify-content:center; padding:20px; }
    .hub-overlay.open { display:flex; }
    .hub-modal { background:var(--surface); border-radius:14px; width:100%; max-width:640px; max-height:90vh; overflow-y:auto; padding:28px; position:relative; box-shadow:0 20px 60px rgba(0,0,0,.15); }
    .hub-modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
    .hub-modal-title { font-size:18px; font-weight:700; }
    .hub-modal-close { background:none; border:none; cursor:pointer; color:var(--muted); padding:4px; border-radius:6px; transition:color .15s; }
    .hub-modal-close:hover { color:var(--text); }
    .hub-field { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
    .hub-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
    .hub-input,.hub-textarea,.hub-select {
      background:var(--bg); border:1px solid var(--border); color:var(--text);
      font-family:inherit; font-size:14px; padding:11px 14px; border-radius:var(--radius);
      outline:none; transition:border-color .15s; width:100%;
    }
    .hub-input:focus,.hub-textarea:focus,.hub-select:focus { border-color:var(--accent); }
    .hub-input::placeholder,.hub-textarea::placeholder { color:var(--muted); }
    .hub-textarea { min-height:160px; resize:vertical; line-height:1.6; }
    .hub-select option { background:var(--surface); }
    .hub-field-row { display:flex; gap:12px; }
    .hub-field-row .hub-field { flex:1; }
    .hub-modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:4px; }
    .hub-modal-actions.space-between { justify-content:space-between; align-items:center; flex-wrap:wrap; }
    .hub-alert { padding:11px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:14px; display:none; }
    .hub-alert-error   { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); color:#dc2626; }
    .hub-alert-success { background:rgba(16,185,129,.08); border:1px solid rgba(16,185,129,.2); color:#059669; }

    .spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-center { display:flex; justify-content:center; padding:60px 0; }

    /* ── Profile ── */
    .profile-wrap { max-width:480px; }
    .profile-avatar-section { display:flex; flex-direction:column; align-items:center; gap:14px; margin-bottom:28px; }
    .profile-avatar-lg { width:96px; height:96px; border-radius:50%; object-fit:cover; border:2px solid var(--border); box-shadow:var(--shadow); }
    .profile-avatar-btn { font-size:12px; font-weight:600; color:var(--accent); cursor:pointer; background:none; border:none; font-family:inherit; padding:0; }
    .profile-avatar-btn:hover { opacity:.8; }
    .profile-section-title { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px; padding-top:20px; border-top:1px solid var(--border); }

    /* ── Avatar sm ── */
    .hub-avatar-sm { width:32px; height:32px; border-radius:50%; object-fit:cover; border:2px solid var(--border); flex-shrink:0; }

    /* ── Mobile ── */
    .hub-mobile-header { display:none; }
    @media(max-width:768px) {
      .hub-sidebar { display:none; }
      .hub-content { margin-left:0; padding:16px; }
      .hub-mobile-header {
        display:flex; align-items:center; justify-content:space-between;
        background:var(--surface); border-bottom:1px solid var(--border);
        padding:12px 16px; position:sticky; top:0; z-index:20; gap:10px;
      }
      .hub-mobile-logo { display:flex; align-items:center; gap:8px; cursor:pointer; }
      .hub-mobile-logo-mark { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#fff; }
      .hub-mobile-logo-text { font-weight:700; font-size:15px; }
      .hub-field-row { flex-direction:column; }
      .hub-modal { padding:20px; }
      .detail-title { font-size:20px; }
    }
  </style>
</head>
<body>

<!-- Mobile header -->
<div class="hub-mobile-header">
  <div class="hub-mobile-logo" id="mobile-logo">
    <div class="hub-mobile-logo-mark">SRT</div>
    <div class="hub-mobile-logo-text">SRT Hub</div>
  </div>
  <div id="hub-auth-area-mobile"></div>
</div>

<!-- Auth Modal -->
<div class="hub-overlay" id="auth-overlay">
  <div class="hub-modal" style="max-width:420px">
    <div class="hub-modal-header">
      <div class="hub-modal-title" id="auth-title">Sign In</div>
      <button class="hub-modal-close" id="auth-close">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="hub-alert hub-alert-error"   id="auth-error"></div>
    <div class="hub-alert hub-alert-success" id="auth-success"></div>
    <div class="hub-field">
      <label class="hub-label" for="auth-username">Username</label>
      <input class="hub-input" id="auth-username" type="text" placeholder="your_username" autocomplete="username" maxlength="30">
    </div>
    <div class="hub-field" id="auth-email-field" style="display:none">
      <label class="hub-label" for="auth-email">Email</label>
      <input class="hub-input" id="auth-email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="hub-field">
      <label class="hub-label" for="auth-password">Password</label>
      <input class="hub-input" id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="hub-modal-actions space-between">
      <button class="btn btn-ghost btn-sm" id="auth-switch">No account? Register</button>
      <button class="btn btn-primary" id="auth-submit">
        <span id="auth-label">Sign In</span>
        <span id="auth-spinner" style="display:none"><span class="spinner" style="width:14px;height:14px;border-width:2px"></span></span>
      </button>
    </div>
  </div>
</div>

<!-- New Post Modal -->
<div class="hub-overlay" id="hub-overlay">
  <div class="hub-modal">
    <div class="hub-modal-header">
      <div class="hub-modal-title">New Post</div>
      <button class="hub-modal-close" id="hub-modal-close">

<script>
(function () {
  /* ─── Config ─── */
  const SB_URL = 'https://mtdpaiadnldbvaqmyteg.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10ZHBhaWFkbmxkYnZhcW15dGVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMDI5OTMsImV4cCI6MjA5ODU3ODk5M30.NnhrfI-GAioiylfl5zr8hiYGPAx52dGgpxM2j7htycI';

  const sb = supabase.createClient(SB_URL, SB_KEY);
  let sbSession = null;
  let authMode  = 'signin';

  let allPosts         = [];
  let allCategories    = [];
  let activeCategory   = 'all';
  let searchQuery      = '';
  let openPostComments = [];
  let profileMap       = {};
  let reactionsMap     = {};

  /* ─── Helpers ─── */
  function catSlug(name) { return (name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
  function catClass(name) {
    const map = { general:'cat-general', ideas:'cat-ideas', 'show-and-tell':'cat-show-and-tell',
                  'q-a':'cat-q-a', announcements:'cat-announcements', polls:'cat-polls',
                  research:'cat-research', academia:'cat-academia', hobby:'cat-hobby', 'just-for-fun':'cat-just-for-fun' };
    return map[catSlug(name)] || 'cat-default';
  }
  function stripMd(md) {
    return (md||'').replace(/<!--.*?-->/gs,'').replace(/!\[.*?\]\(.*?\)/g,'').replace(/\[([^\]]+)\]\(.*?\)/g,'$1')
      .replace(/#{1,6}\s+/g,'').replace(/(\*\*|__)(.*?)\1/g,'$2').replace(/(\*|_)(.*?)\1/g,'$2')
      .replace(/`{1,3}[^`]*`{1,3}/g,'').replace(/>\s+/g,'').replace(/[-*+]\s+/g,'')
      .replace(/\n+/g,' ').trim();
  }
  function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }
  function displayName(name) { return name || 'Anonymous'; }
  function initialAvatar(identifier) {
    const colors = ['#e8a020','#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#ec4899'];
    const hash = [...(identifier||'?')].reduce((a,c) => a + c.charCodeAt(0), 0);
    const color = colors[hash % colors.length];
    const letter = (identifier||'?')[0].toUpperCase();
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"><rect width="64" height="64" rx="32" fill="${color}"/><text x="32" y="43" font-size="28" font-family="sans-serif" fill="white" text-anchor="middle" font-weight="700">${letter}</text></svg>`;
    return 'data:image/svg+xml;base64,' + btoa(svg);
  }
  function extractFirstImage(md) {
    const m = (md||'').match(/!\[.*?\]\((https?:\/\/[^\s)]+)\)/);
    return m ? m[1] : null;
  }
  function avatarFor(authorEmail) {
    const profile = Object.values(profileMap).find(p => p.username === authorEmail);
    return profile?.avatar_url || initialAvatar(authorEmail);
  }

  /* ─── Views ─── */
  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  /* ─── Auth ─── */
  sb.auth.onAuthStateChange((_event, session) => { sbSession = session; renderAuth(); });

  function openAuthModal(mode) {
    authMode = mode || 'signin';
    syncAuthMode();
    document.getElementById('auth-username').value = '';
    document.getElementById('auth-email').value    = '';
    document.getElementById('auth-password').value = '';
    document.getElementById('auth-error').style.display   = 'none';
    document.getElementById('auth-success').style.display = 'none';
    document.getElementById('auth-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('auth-username').focus(), 50);
  }
  function closeAuthModal() {
    document.getElementById('auth-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function syncAuthMode() {
    const isSignin = authMode === 'signin';
    document.getElementById('auth-title').textContent  = isSignin ? 'Sign In' : 'Create Account';
    document.getElementById('auth-label').textContent  = isSignin ? 'Sign In' : 'Register';
    document.getElementById('auth-switch').textContent = isSignin ? 'No account? Register' : 'Have an account? Sign In';
    document.getElementById('auth-password').setAttribute('autocomplete', isSignin ? 'current-password' : 'new-password');
    document.getElementById('auth-email-field').style.display = isSignin ? 'none' : '';
  }

  document.getElementById('auth-close').addEventListener('click', closeAuthModal);
  document.getElementById('auth-overlay').addEventListener('click', e => { if (e.target === document.getElementById('auth-overlay')) closeAuthModal(); });
  document.getElementById('auth-switch').addEventListener('click', () => {
    authMode = authMode === 'signin' ? 'register' : 'signin';
    syncAuthMode();
    document.getElementById('auth-error').style.display   = 'none';
    document.getElementById('auth-success').style.display = 'none';
  });
  document.getElementById('auth-submit').addEventListener('click', handleAuth);
  document.getElementById('auth-password').addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });

  function setAuthBusy(busy) {
    document.getElementById('auth-label').style.display   = busy ? 'none' : 'inline';
    document.getElementById('auth-spinner').style.display = busy ? 'inline' : 'none';
    document.getElementById('auth-submit').disabled = busy;
  }

  async function handleAuth() {
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl    = document.getElementById('auth-error');
    errEl.style.display = 'none';

    if (!username || username.length < 3) { errEl.textContent='Username must be at least 3 characters.'; errEl.style.display='block'; return; }
    if (!password || password.length < 6) { errEl.textContent='Password must be at least 6 characters.'; errEl.style.display='block'; return; }

    setAuthBusy(true);

    if (authMode === 'signin') {
      const { data: profile } = await sb.from('hub_profiles').select('email').eq('username', username).single();
      if (!profile) { errEl.textContent='Username not found.'; errEl.style.display='block'; setAuthBusy(false); return; }
      const { error } = await sb.auth.signInWithPassword({ email: profile.email, password });
      setAuthBusy(false);
      if (error) { errEl.textContent='Incorrect password.'; errEl.style.display='block'; return; }
    } else {
      const email = document.getElementById('auth-email').value.trim();
      if (!email) { errEl.textContent='Please enter your email.'; errEl.style.display='block'; setAuthBusy(false); return; }
      const { data: existing } = await sb.from('hub_profiles').select('id').eq('username', username).maybeSingle();
      if (existing) { errEl.textContent='Username already taken.'; errEl.style.display='block'; setAuthBusy(false); return; }
      const { data, error } = await sb.auth.signUp({ email, password, options: { data: { username } } });
      if (error) { errEl.textContent=error.message; errEl.style.display='block'; setAuthBusy(false); return; }
      if (data.user) await sb.from('hub_profiles').insert({ user_id: data.user.id, username, email });
      setAuthBusy(false);
    }
    closeAuthModal();
  }

  function currentUsername() {
    return sbSession?.user?.user_metadata?.username || sbSession?.user?.email?.split('@')[0] || 'user';
  }

  function renderAuth() {
    const el = document.getElementById('hub-auth-area');
    if (sbSession?.user) {
      const name      = currentUsername();
      const myProfile = profileMap[sbSession.user.id];
      const avatar    = myProfile?.avatar_url || initialAvatar(name);
      el.innerHTML = `
        <div class="sidebar-user-row" id="user-avatar-row">
          <img class="hub-avatar-sm" src="${avatar}" alt="${name}">
          <div>
            <div class="sidebar-user-name">${name}</div>
            <div class="sidebar-user-link">View profile</div>
          </div>
        </div>
        <button class="sidebar-signout" id="signout-btn">Sign out</button>`;
      document.getElementById('user-avatar-row').addEventListener('click', openProfile);
      document.getElementById('signout-btn').addEventListener('click', () => sb.auth.signOut());
    } else {
      el.innerHTML = `
        <div class="sidebar-signin">
          <button class="btn-signin" id="login-btn">Sign In</button>
          <button class="btn btn-primary btn-sm" id="register-btn" style="width:100%;justify-content:center">Create Account</button>
        </div>`;
      document.getElementById('login-btn').addEventListener('click', () => openAuthModal('signin'));
      document.getElementById('register-btn').addEventListener('click', () => openAuthModal('register'));
    }
  }

  /* ─── Feed ─── */
  function getFiltered() {
    let r = allPosts;
    if (activeCategory !== 'all') r = r.filter(p => catSlug(p.category?.name) === activeCategory);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      r = r.filter(p => p.title.toLowerCase().includes(q) || stripMd(p.body).toLowerCase().includes(q));
    }
    return r;
  }

  function renderCategories() {
    const el = document.getElementById('hub-cats');
    const counts = {};
    allPosts.forEach(p => { const k = catSlug(p.category?.name); counts[k]=(counts[k]||0)+1; });
    el.innerHTML = `<button class="hub-cat-btn${activeCategory==='all'?' active':''}" data-cat="all"><span>All</span><span class="hub-cat-count">${allPosts.length}</span></button>` +
      allCategories.filter(c => counts[catSlug(c.name)]).map(c => {
        const slug = catSlug(c.name);
        return `<button class="hub-cat-btn${activeCategory===slug?' active':''}" data-cat="${slug}"><span>${c.emoji} ${c.name}</span><span class="hub-cat-count">${counts[slug]||0}</span></button>`;
      }).join('');
    el.querySelectorAll('.hub-cat-btn').forEach(btn => btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat; renderCategories(); renderFeed();
    }));
  }

  function renderFeed() {
    const filtered = getFiltered();
    document.getElementById('hub-stats').innerHTML = `<span class="hub-stat-val">${filtered.length}</span> post${filtered.length!==1?'s':''}`;
    const listEl = document.getElementById('hub-list');
    if (!filtered.length) {
      listEl.innerHTML = `<div class="hub-empty"><h3>${searchQuery||activeCategory!=='all'?'No posts match your filters':'No posts yet'}</h3><p>${searchQuery||activeCategory!=='all'?'Try a different search or category.':'Be the first to share your research.'}</p></div>`;
      return;
    }
    const cat = p => p.category || {};
    listEl.innerHTML = filtered.map(p => {
      const name    = displayName(p.author_email);
      const avatar  = avatarFor(p.author_email);
      const preview = stripMd(p.body);
      const imgUrl  = extractFirstImage(p.body);
      const count   = p.comment_count || 0;
      const tags    = [p.simulant].filter(Boolean);
      return `<div class="hub-card" data-id="${p.id}">
        <div class="hub-card-top">
          <img class="hub-avatar" src="${avatar}" alt="${name}" loading="lazy">
          <div class="hub-author-info">
            <div class="hub-author-name">${name}</div>
            <div class="hub-author-date">${fmtDate(p.created_at)}</div>
          </div>
          <span class="hub-cat-pill ${catClass(cat(p).name)}">${cat(p).emoji||''} ${cat(p).name||''}</span>
        </div>
        <div class="hub-card-title-row">
          <div class="hub-card-title">${p.title}</div>
          ${tags.map(t=>`<span class="hub-tag">${t}</span>`).join('')}
        </div>
        ${preview?`<div class="hub-card-body">${preview}</div>`:''}
        ${imgUrl?`<img class="hub-card-img" src="${imgUrl}" alt="" loading="lazy">`:''}
        <div class="hub-card-footer">
          <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
          ${count} comment${count!==1?'s':''}
          <span>🌙 ${(reactionsMap[p.id]?.size||0)}</span>
        </div>
      </div>`;
    }).join('');
    listEl.querySelectorAll('.hub-card').forEach(card => card.addEventListener('click', () => openDetail(card.dataset.id)));
  }

  /* ─── Post Detail ─── */
  async function openDetail(id) {
    const post = allPosts.find(x => x.id === id);
    if (!post) return;
    showView('view-detail');
    document.getElementById('detail-content').innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
    const { data: comments } = await sb.from('hub_comments').select('*').eq('post_id', id).order('created_at', { ascending: true });
    openPostComments = comments || [];
    renderDetail(post, openPostComments);
  }

  function renderDetail(post, comments) {
    const cat        = post.category || {};
    const authorName = displayName(post.author_email);
    const authorSrc  = avatarFor(post.author_email);
    const isOwner    = sbSession?.user?.id === post.author_id;
    const reacted    = reactionsMap[post.id]?.has(sbSession?.user?.id);
    const moonCount  = reactionsMap[post.id]?.size || 0;

    const topLevel = comments.filter(c => !c.parent_id);
    const repliesOf = id => comments.filter(c => c.parent_id === id);

    function buildComment(c) {
      const cName    = displayName(c.author_email);
      const cSrc     = avatarFor(c.author_email);
      const cIsOwner = sbSession?.user?.id === c.author_id;
      const replies  = repliesOf(c.id);
      const replyForm = sbSession ? `
        <div class="reply-form" id="reply-form-${c.id}">
          <textarea class="reply-textarea" id="reply-input-${c.id}" placeholder="Reply to ${cName}…"></textarea>
          <div class="reply-form-footer">
            <button class="btn btn-ghost btn-sm" data-cancel-reply="${c.id}">Cancel</button>
            <button class="btn btn-primary btn-sm" data-submit-reply="${c.id}">Reply</button>
          </div>
        </div>` : '';
      return `<div class="comment" data-cid="${c.id}">
        <img class="hub-avatar" src="${cSrc}" alt="${cName}" loading="lazy">
        <div class="comment-body" style="flex:1">
          <div class="comment-meta" style="display:flex;align-items:center;justify-content:space-between">
            <span><strong>${cName}</strong> &middot; ${fmtDate(c.created_at)}</span>
            <div style="display:flex;gap:8px;align-items:center">
              ${sbSession ? `<button class="comment-reply-btn" data-open-reply="${c.id}">↩ Reply</button>` : ''}
              ${cIsOwner ? `<button class="action-btn delete" data-delete-comment="${c.id}">Delete</button>` : ''}
            </div>
          </div>
          <div class="comment-text">${marked.parse(c.body)}</div>
          ${replyForm}
          ${replies.length ? `<div class="comment-replies">${replies.map(r => buildComment(r)).join('')}</div>` : ''}
        </div>
      </div>`;
    }

    const commentHtml = topLevel.map(c => buildComment(c)).join('');
    const commentFormHtml = sbSession
      ? `<div class="comment-form">
          <div class="comment-form-title">Leave a comment</div>
          <textarea class="comment-textarea" id="comment-input" placeholder="Write a comment… Markdown supported"></textarea>
          <div class="hub-alert hub-alert-error" id="comment-error"></div>
          <div class="comment-form-footer">
            <button class="btn btn-primary btn-sm" id="comment-submit">
              <span id="comment-label">Post Comment</span>
              <span id="comment-spinner" style="display:none"><span class="spinner" style="width:12px;height:12px;border-width:2px"></span></span>
            </button>
          </div>
        </div>`
      : `<div class="login-prompt">
          <span>Sign in to leave a comment</span>
          <button class="btn btn-primary btn-sm" onclick="window.__openAuth()">Sign In</button>
        </div>`;

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-header">
        <div class="detail-meta">
          <img class="hub-avatar" src="${authorSrc}" alt="${authorName}">
          <div class="detail-author-info">
            <div class="hub-author-name">${authorName}</div>
            <div class="hub-author-date">${fmtDate(post.created_at)}</div>
          </div>
          <span class="hub-cat-pill ${catClass(cat.name)}">${cat.emoji||''} ${cat.name||''}</span>
        </div>
        <div class="detail-title">${post.title}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:14px">
          <button class="moon-btn${reacted?' reacted':''}" id="moon-btn">🌙 ${moonCount}</button>
          ${isOwner ? `<div class="post-actions"><button class="action-btn" id="edit-post-btn">Edit</button><button class="action-btn delete" id="delete-post-btn">Delete</button></div>` : ''}
        </div>
      </div>
      <div class="detail-body" id="detail-body-content">${marked.parse(post.body)}</div>
      <div id="edit-post-form" style="display:none;margin-bottom:16px">
        <textarea class="comment-textarea" id="edit-post-textarea" style="min-height:200px;background:var(--bg);border:1px solid var(--border)">${post.body}</textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
          <button class="btn btn-ghost btn-sm" id="edit-cancel-btn">Cancel</button>
          <button class="btn btn-primary btn-sm" id="edit-save-btn">Save</button>
        </div>
      </div>
      <div class="comments-section">
        <div class="comments-heading">${topLevel.length} Comment${topLevel.length!==1?'s':''}</div>
        ${commentHtml}
        ${commentFormHtml}
      </div>`;

    document.getElementById('moon-btn').addEventListener('click', () => toggleReaction(post));

    if (isOwner) {
      document.getElementById('edit-post-btn').addEventListener('click', () => {
        document.getElementById('detail-body-content').style.display = 'none';
        document.getElementById('edit-post-form').style.display = 'block';
        document.getElementById('edit-post-btn').style.display  = 'none';
      });
      document.getElementById('edit-cancel-btn').addEventListener('click', () => {
        document.getElementById('detail-body-content').style.display = 'block';
        document.getElementById('edit-post-form').style.display = 'none';
        document.getElementById('edit-post-btn').style.display  = 'inline-flex';
      });
      document.getElementById('edit-save-btn').addEventListener('click', async () => {
        const newBody = document.getElementById('edit-post-textarea').value.trim();
        if (!newBody) return;
        const { error } = await sb.from('hub_posts').update({ body: newBody }).eq('id', post.id);
        if (!error) {
          post.body = newBody;
          const idx = allPosts.findIndex(p => p.id === post.id);
          if (idx !== -1) allPosts[idx].body = newBody;
          renderDetail(post, openPostComments);
        }
      });
      document.getElementById('delete-post-btn').addEventListener('click', async () => {
        if (!confirm('Delete this post? This cannot be undone.')) return;
        const { error } = await sb.from('hub_posts').delete().eq('id', post.id);
        if (!error) { allPosts = allPosts.filter(p => p.id !== post.id); renderCategories(); renderFeed(); showView('view-feed'); }
      });
    }

    document.querySelectorAll('[data-open-reply]').forEach(btn => {
      btn.addEventListener('click', () => {
        const form = document.getElementById('reply-form-' + btn.dataset.openReply);
        if (form) { form.classList.toggle('open'); if (form.classList.contains('open')) form.querySelector('textarea')?.focus(); }
      });
    });
    document.querySelectorAll('[data-cancel-reply]').forEach(btn => {
      btn.addEventListener('click', () => {
        const form = document.getElementById('reply-form-' + btn.dataset.cancelReply);
        if (form) { form.classList.remove('open'); form.querySelector('textarea').value = ''; }
      });
    });
    document.querySelectorAll('[data-submit-reply]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const parentId = btn.dataset.submitReply;
        const body = document.getElementById('reply-input-' + parentId)?.value.trim();
        if (!body || !sbSession) return;
        btn.disabled = true;
        const { data, error } = await sb.from('hub_comments')
          .insert({ post_id: post.id, parent_id: parentId, body, author_id: sbSession.user.id, author_email: currentUsername() })
          .select().single();
        btn.disabled = false;
        if (!error && data) { openPostComments = [...openPostComments, data]; post.comment_count = (post.comment_count||0)+1; renderDetail(post, openPostComments); }
      });
    });
    document.querySelectorAll('[data-delete-comment]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const cid = btn.dataset.deleteComment;
        if (!confirm('Delete this comment?')) return;
        const { error } = await sb.from('hub_comments').delete().eq('id', cid);
        if (!error) { openPostComments = openPostComments.filter(c => c.id !== cid && c.parent_id !== cid); post.comment_count = Math.max(0,(post.comment_count||1)-1); renderDetail(post, openPostComments); }
      });
    });
    if (sbSession) document.getElementById('comment-submit').addEventListener('click', () => submitComment(post));
  }

  async function submitComment(post) {
    const body  = document.getElementById('comment-input').value.trim();
    const errEl = document.getElementById('comment-error');
    errEl.style.display = 'none';
    if (!body || !sbSession) return;
    document.getElementById('comment-label').style.display   = 'none';
    document.getElementById('comment-spinner').style.display = 'inline';
    document.getElementById('comment-submit').disabled = true;
    const { data, error } = await sb.from('hub_comments')
      .insert({ post_id: post.id, body, author_id: sbSession.user.id, author_email: currentUsername() })
      .select().single();
    document.getElementById('comment-label').style.display   = 'inline';
    document.getElementById('comment-spinner').style.display = 'none';
    document.getElementById('comment-submit').disabled = false;
    if (error) { errEl.textContent = error.message || 'Failed to post comment.'; errEl.style.display='block'; return; }
    post.comment_count = (post.comment_count||0)+1;
    openPostComments = [...openPostComments, data];
    renderDetail(post, openPostComments);
  }

  /* ─── Reactions ─── */
  async function toggleReaction(post) {
    if (!sbSession) { openAuthModal('signin'); return; }
    const uid = sbSession.user.id;
    const set = reactionsMap[post.id] || new Set();
    if (set.has(uid)) { await sb.from('hub_reactions').delete().eq('post_id', post.id).eq('user_id', uid); set.delete(uid); }
    else { await sb.from('hub_reactions').insert({ post_id: post.id, user_id: uid }); set.add(uid); }
    reactionsMap[post.id] = set;
    renderDetail(post, openPostComments);
    renderFeed();
  }

  /* ─── Image Upload ─── */
  document.getElementById('img-file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || !sbSession) return;
    const label = document.getElementById('img-upload-label');
    label.textContent = 'Uploading…';
    const ext  = file.name.split('.').pop();
    const path = `${sbSession.user.id}/${Date.now()}.${ext}`;
    const { error } = await sb.storage.from('post-images').upload(path, file, { upsert: false });
    if (error) { label.textContent='Add Image'; alert('Upload failed: '+error.message); e.target.value=''; return; }
    const { data: { publicUrl } } = sb.storage.from('post-images').getPublicUrl(path);
    const textarea = document.getElementById('post-body');
    const md = `\n![image](${publicUrl})\n`;
    const pos = textarea.selectionStart;
    textarea.value = textarea.value.slice(0,pos) + md + textarea.value.slice(pos);
    textarea.selectionStart = textarea.selectionEnd = pos + md.length;
    textarea.focus();
    label.textContent = 'Add Image';
    e.target.value = '';
  });

  /* ─── New Post Modal ─── */
  const overlay = document.getElementById('hub-overlay');
  function openModal() {
    if (!sbSession) { openAuthModal('signin'); return; }
    overlay.classList.add('open'); document.body.style.overflow = 'hidden';
    document.getElementById('modal-error').style.display   = 'none';
    document.getElementById('modal-success').style.display = 'none';
    document.getElementById('post-title').value = '';
    document.getElementById('post-body').value  = '';
    document.getElementById('post-simulant').value = '';
  }
  function closeModal() { overlay.classList.remove('open'); document.body.style.overflow = ''; }

  document.getElementById('hub-modal-close').addEventListener('click', closeModal);
  document.getElementById('hub-btn-cancel').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.getElementById('sidebar-new-post-btn').addEventListener('click', openModal);

  document.getElementById('hub-btn-submit').addEventListener('click', async () => {
    const title    = document.getElementById('post-title').value.trim();
    const body     = document.getElementById('post-body').value.trim();
    const catId    = document.getElementById('post-category').value;
    const simulant = document.getElementById('post-simulant').value;
    const errEl    = document.getElementById('modal-error');
    const sucEl    = document.getElementById('modal-success');
    errEl.style.display='none'; sucEl.style.display='none';
    if (!title)  { errEl.textContent='Please add a title.'; errEl.style.display='block'; return; }
    if (!catId)  { errEl.textContent='Please select a category.'; errEl.style.display='block'; return; }
    if (!sbSession) { errEl.textContent='Please sign in first.'; errEl.style.display='block'; return; }
    document.getElementById('submit-label').style.display   = 'none';
    document.getElementById('submit-spinner').style.display = 'inline';
    document.getElementById('hub-btn-submit').disabled = true;
    const fullBody = simulant ? `**Simulant:** ${simulant}\n\n${body}` : body;
    const { data, error } = await sb.from('hub_posts')
      .insert({ title, body:fullBody, category_id:catId, simulant:simulant||null, author_id:sbSession.user.id, author_email:currentUsername() })
      .select('*, category:hub_categories(*)').single();
    document.getElementById('submit-label').style.display   = 'inline';
    document.getElementById('submit-spinner').style.display = 'none';
    document.getElementById('hub-btn-submit').disabled = false;
    if (error) { errEl.textContent=error.message||'Failed to create post.'; errEl.style.display='block'; return; }
    data.comment_count = 0;
    allPosts.unshift(data);
    sucEl.textContent='Post published!'; sucEl.style.display='block';
    setTimeout(() => { closeModal(); renderCategories(); renderFeed(); }, 1200);
  });

  /* ─── Profile ─── */
  function openProfile() {
    if (!sbSession) return;
    const name      = currentUsername();
    const myProfile = profileMap[sbSession.user.id];
    const avatar    = myProfile?.avatar_url || initialAvatar(name);
    document.getElementById('profile-avatar-img').src    = avatar;
    document.getElementById('profile-username').value    = name;
    document.getElementById('profile-new-password').value     = '';
    document.getElementById('profile-confirm-password').value = '';
    document.getElementById('profile-error').style.display   = 'none';
    document.getElementById('profile-success').style.display = 'none';
    showView('view-profile');
  }

  document.getElementById('profile-back').addEventListener('click', () => showView('view-feed'));

  document.getElementById('profile-avatar-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || !sbSession) return;
    const btn = document.querySelector('.profile-avatar-btn');
    btn.textContent = 'Uploading…';
    const ext  = file.name.split('.').pop();
    const path = `${sbSession.user.id}/avatar.${ext}`;
    const { error } = await sb.storage.from('profile-pictures').upload(path, file, { upsert: true });
    if (error) { btn.textContent='Change Profile Picture'; alert('Upload failed: '+error.message); e.target.value=''; return; }
    const { data: { publicUrl } } = sb.storage.from('profile-pictures').getPublicUrl(path);
    const bustedUrl = publicUrl + '?t=' + Date.now();
    await sb.from('hub_profiles').update({ avatar_url: bustedUrl }).eq('user_id', sbSession.user.id);
    if (profileMap[sbSession.user.id]) profileMap[sbSession.user.id].avatar_url = bustedUrl;
    document.getElementById('profile-avatar-img').src = bustedUrl;
    btn.textContent = 'Change Profile Picture';
    renderAuth(); e.target.value = '';
  });

  document.getElementById('profile-save').addEventListener('click', async () => {
    const newUsername = document.getElementById('profile-username').value.trim();
    const newPassword = document.getElementById('profile-new-password').value;
    const confirmPw   = document.getElementById('profile-confirm-password').value;
    const errEl       = document.getElementById('profile-error');
    const sucEl       = document.getElementById('profile-success');
    errEl.style.display='none'; sucEl.style.display='none';
    if (!newUsername||newUsername.length<3) { errEl.textContent='Username must be at least 3 characters.'; errEl.style.display='block'; return; }
    if (newPassword&&newPassword.length<6)  { errEl.textContent='Password must be at least 6 characters.'; errEl.style.display='block'; return; }
    if (newPassword&&newPassword!==confirmPw) { errEl.textContent='Passwords do not match.'; errEl.style.display='block'; return; }
    document.getElementById('profile-save-label').style.display   = 'none';
    document.getElementById('profile-save-spinner').style.display = 'inline';
    document.getElementById('profile-save').disabled = true;
    const currentName = currentUsername();
    if (newUsername !== currentName) {
      const { data: taken } = await sb.from('hub_profiles').select('id').eq('username', newUsername).maybeSingle();
      if (taken) { errEl.textContent='Username already taken.'; errEl.style.display='block'; document.getElementById('profile-save-label').style.display='inline'; document.getElementById('profile-save-spinner').style.display='none'; document.getElementById('profile-save').disabled=false; return; }
      await sb.from('hub_profiles').update({ username: newUsername }).eq('user_id', sbSession.user.id);
      await sb.auth.updateUser({ data: { username: newUsername } });
      if (profileMap[sbSession.user.id]) profileMap[sbSession.user.id].username = newUsername;
    }
    if (newPassword) {
      const { error } = await sb.auth.updateUser({ password: newPassword });
      if (error) { errEl.textContent=error.message; errEl.style.display='block'; document.getElementById('profile-save-label').style.display='inline'; document.getElementById('profile-save-spinner').style.display='none'; document.getElementById('profile-save').disabled=false; return; }
    }
    document.getElementById('profile-save-label').style.display   = 'inline';
    document.getElementById('profile-save-spinner').style.display = 'none';
    document.getElementById('profile-save').disabled = false;
    document.getElementById('profile-new-password').value     = '';
    document.getElementById('profile-confirm-password').value = '';
    sucEl.textContent='Profile updated!'; sucEl.style.display='block';
    renderAuth();
  });

  /* ─── Global helpers ─── */
  window.__openAuth = () => openAuthModal('signin');

  /* ─── Init ─── */
  document.getElementById('detail-back').addEventListener('click', () => showView('view-feed'));
  document.getElementById('hub-logo').addEventListener('click',    () => showView('view-feed'));
  document.getElementById('hub-search').addEventListener('input', e => { searchQuery=e.target.value; renderFeed(); });
  document.getElementById('mobile-logo')?.addEventListener('click', () => showView('view-feed'));

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    sbSession = session;
    renderAuth();

    const [{ data: cats }, { data: posts }, { data: profiles }, { data: reactions }] = await Promise.all([
      sb.from('hub_categories').select('*').order('name'),
      sb.from('hub_posts').select('*, category:hub_categories(*), hub_comments(count)').order('created_at', { ascending: false }),
      sb.from('hub_profiles').select('user_id, username, avatar_url'),
      sb.from('hub_reactions').select('post_id, user_id')
    ]);

    profileMap = Object.fromEntries((profiles||[]).map(p => [p.user_id, p]));
    reactionsMap = {};
    (reactions||[]).forEach(r => {
      if (!reactionsMap[r.post_id]) reactionsMap[r.post_id] = new Set();
      reactionsMap[r.post_id].add(r.user_id);
    });
    allCategories = cats || [];
    allPosts = (posts||[]).map(p => ({ ...p, comment_count: p.hub_comments?.[0]?.count ?? 0 }));

    document.getElementById('post-category').innerHTML =
      '<option value="">Select category…</option>' +
      allCategories.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');

    renderAuth();
    renderCategories();
    renderFeed();
  }

  init();
})();
</script>
</body>
</html>
