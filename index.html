<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRT Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #001219;
      --surface: #022e4b;
      --border:  rgba(143,141,141,0.25);
      --accent:  #c87a41;
      --text:    #fafafa;
      --muted:   #8f8d8d;
      --radius:  8px;
    }
    body { font-family:'Titillium Web',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* Header */
    .hub-header {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:10;
    }
    .hub-logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .hub-logo-mark { width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff; }
    .hub-logo-text { font-weight:700;font-size:18px; }
    .hub-logo-sub  { font-size:11px;color:var(--muted);margin-top:1px; }
    .hub-header-right { display:flex;align-items:center;gap:10px; }

    .btn {
      display:inline-flex;align-items:center;gap:7px;border:none;border-radius:var(--radius);
      font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;padding:9px 18px;
      transition:opacity .15s;text-decoration:none;
    }
    .btn:hover { opacity:.85; }
    .btn-primary { background:var(--accent);color:#fff; }
    .btn-ghost   { background:none;border:1px solid var(--border);color:var(--muted); }
    .btn-ghost:hover { border-color:var(--text);color:var(--text); }
    .btn-sm { padding:6px 14px;font-size:12px; }

    .hub-avatar-sm { width:30px;height:30px;border-radius:50%;object-fit:cover;cursor:pointer; }

    /* Main */
    .hub-main { max-width:820px;margin:0 auto;padding:28px 20px; }

    /* Views */
    .view { display:none; }
    .view.active { display:block; }

    /* Controls */
    .hub-controls { display:flex;flex-direction:column;gap:12px;margin-bottom:24px; }
    .hub-search-wrap { position:relative; }
    .hub-search-icon { position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none; }
    .hub-search {
      width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);
      font-family:inherit;font-size:14px;padding:11px 16px 11px 40px;border-radius:var(--radius);
      outline:none;transition:border-color .15s;
    }
    .hub-search:focus { border-color:var(--accent); }
    .hub-search::placeholder { color:var(--muted); }
    .hub-cats { display:flex;flex-wrap:wrap;gap:6px; }
    .hub-cat-btn {
      display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);
      color:var(--muted);font-family:inherit;font-size:12px;font-weight:700;
      padding:6px 14px;border-radius:999px;cursor:pointer;transition:all .15s;
    }
    .hub-cat-btn:hover { border-color:var(--accent);color:var(--text); }
    .hub-cat-btn.active { background:var(--accent);border-color:var(--accent);color:#fff; }

    /* Stats */
    .hub-stats { font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px; }
    .hub-stat-val { color:var(--accent); }

    /* Cards */
    .hub-list { display:flex;flex-direction:column;gap:10px; }
    .hub-card {
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:20px 22px;cursor:pointer;transition:border-color .15s,transform .1s;
    }
    .hub-card:hover { border-color:rgba(200,122,65,.5);transform:translateY(-1px); }
    .hub-card-top { display:flex;align-items:center;gap:10px;margin-bottom:12px; }
    .hub-avatar { width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg); }
    .hub-author-name { font-size:13px;font-weight:700; }
    .hub-author-date { font-size:11px;color:var(--muted);margin-top:1px; }
    .hub-cat-pill {
      font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
      padding:3px 10px;border-radius:4px;white-space:nowrap;
    }
    .cat-general       { background:rgba(59,130,246,.12);  color:#7db5f5;border:1px solid rgba(59,130,246,.3); }
    .cat-ideas         { background:rgba(168,85,247,.12);  color:#c084fc;border:1px solid rgba(168,85,247,.3); }
    .cat-show-and-tell { background:rgba(34,197,94,.12);   color:#4ade80;border:1px solid rgba(34,197,94,.3); }
    .cat-q-a           { background:rgba(234,179,8,.12);   color:#facc15;border:1px solid rgba(234,179,8,.3); }
    .cat-announcements { background:rgba(200,122,65,.12);  color:#e09057;border:1px solid rgba(200,122,65,.3); }
    .cat-polls         { background:rgba(239,68,68,.12);   color:#f97474;border:1px solid rgba(239,68,68,.3); }
    .cat-default       { background:rgba(143,141,141,.1);  color:#adadad;border:1px solid rgba(143,141,141,.25); }

    .hub-card-title { font-size:16px;font-weight:700;line-height:1.4;margin-bottom:8px; }
    .hub-card-body  { font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden; }
    .hub-card-footer { display:flex;align-items:center;gap:14px;font-size:12px;color:var(--muted); }
    .hub-labels { display:flex;flex-wrap:wrap;gap:5px;margin-left:auto; }
    .hub-label { font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;font-family:monospace; }

    /* Empty */
    .hub-empty { text-align:center;padding:80px 20px;color:var(--muted); }
    .hub-empty h3 { font-size:18px;color:var(--text);margin-bottom:8px; }
    .hub-empty p  { font-size:14px;margin-bottom:20px; }

    /* ── Post Detail View ── */
    .detail-back {
      display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;
      color:var(--muted);cursor:pointer;margin-bottom:24px;transition:color .15s;background:none;border:none;
    }
    .detail-back:hover { color:var(--text); }
    .detail-header { margin-bottom:24px; }
    .detail-meta { display:flex;align-items:center;gap:10px;margin-bottom:16px; }
    .detail-author-info { flex:1; }
    .detail-title { font-size:24px;font-weight:700;line-height:1.35;margin-bottom:12px; }
    .detail-labels { display:flex;flex-wrap:wrap;gap:6px;margin-top:10px; }

    .detail-body {
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:24px;margin-bottom:28px;line-height:1.75;font-size:15px;
    }
    .detail-body h1,.detail-body h2,.detail-body h3 { margin:20px 0 10px;font-weight:700; }
    .detail-body h1 { font-size:20px; }
    .detail-body h2 { font-size:17px; }
    .detail-body h3 { font-size:15px; }
    .detail-body p  { margin-bottom:14px;color:rgba(250,250,250,.85); }
    .detail-body a  { color:var(--accent);text-decoration:none; }
    .detail-body a:hover { text-decoration:underline; }
    .detail-body code { background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:13px; }
    .detail-body pre  { background:rgba(255,255,255,.05);padding:16px;border-radius:var(--radius);overflow-x:auto;margin-bottom:14px; }
    .detail-body pre code { background:none;padding:0; }
    .detail-body img  { max-width:100%;border-radius:var(--radius);margin:10px 0; }
    .detail-body ul,.detail-body ol { padding-left:24px;margin-bottom:14px; }
    .detail-body li  { margin-bottom:4px;color:rgba(250,250,250,.85); }
    .detail-body blockquote { border-left:3px solid var(--accent);padding-left:14px;color:var(--muted);margin-bottom:14px; }

    /* Comments */
    .comments-section { margin-top:8px; }
    .comments-heading { font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:16px; }
    .comment {
      display:flex;gap:12px;padding:16px 0;
      border-bottom:1px solid var(--border);
    }
    .comment:last-child { border-bottom:none; }
    .comment-body { flex:1; }
    .comment-meta { font-size:12px;color:var(--muted);margin-bottom:8px; }
    .comment-meta strong { color:var(--text); }
    .comment-text { font-size:14px;line-height:1.65;color:rgba(250,250,250,.85); }
    .comment-text p { margin-bottom:8px; }
    .comment-text p:last-child { margin-bottom:0; }
    .comment-text code { background:rgba(255,255,255,.08);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px; }

    .comment-form { margin-top:24px; }
    .comment-form-title { font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px; }
    .comment-textarea {
      width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);
      font-family:inherit;font-size:14px;padding:12px 14px;border-radius:var(--radius);
      outline:none;resize:vertical;min-height:100px;line-height:1.6;
      transition:border-color .15s;
    }
    .comment-textarea:focus { border-color:var(--accent); }
    .comment-textarea::placeholder { color:var(--muted); }
    .comment-form-footer { display:flex;justify-content:flex-end;margin-top:10px; }

    .login-prompt {
      background:rgba(200,122,65,.08);border:1px solid rgba(200,122,65,.25);
      border-radius:var(--radius);padding:16px 18px;
      font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:20px;
    }

    /* ── New Post Modal ── */
    .hub-overlay { display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px; }
    .hub-overlay.open { display:flex; }
    .hub-modal { background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:28px;position:relative; }
    .hub-modal-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:22px; }
    .hub-modal-title { font-size:18px;font-weight:700; }
    .hub-modal-close { background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:4px;transition:color .15s; }
    .hub-modal-close:hover { color:var(--text); }
    .hub-field { display:flex;flex-direction:column;gap:7px;margin-bottom:16px; }
    .hub-label { font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em; }
    .hub-input,.hub-textarea,.hub-select {
      background:var(--bg);border:1px solid var(--border);color:var(--text);
      font-family:inherit;font-size:14px;padding:11px 14px;border-radius:var(--radius);
      outline:none;transition:border-color .15s;width:100%;
    }
    .hub-input:focus,.hub-textarea:focus,.hub-select:focus { border-color:var(--accent); }
    .hub-input::placeholder,.hub-textarea::placeholder { color:var(--muted); }
    .hub-textarea { min-height:160px;resize:vertical;line-height:1.6; }
    .hub-select option { background:#001219; }
    .hub-field-row { display:flex;gap:12px; }
    .hub-field-row .hub-field { flex:1; }
    .hub-modal-actions { display:flex;gap:10px;justify-content:flex-end;margin-top:4px; }

    .hub-alert {
      padding:11px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;display:none;
    }
    .hub-alert-error   { background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f97474; }
    .hub-alert-success { background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80; }

    /* Loading spinner */
    .spinner {
      width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);
      border-radius:50%;animation:spin .7s linear infinite;display:inline-block;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-center { display:flex;justify-content:center;padding:60px 0; }

    /* Footer */
    .hub-footer { text-align:center;padding:32px 20px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);margin-top:40px; }

    @media(max-width:600px){
      .hub-logo-sub,.hub-logo-text { display:none; }
      .hub-field-row { flex-direction:column; }
      .hub-modal { padding:20px; }
      .detail-title { font-size:20px; }
    }
  </style>
</head>
<body>

<header class="hub-header">
  <div class="hub-logo" id="hub-logo">
    <div class="hub-logo-mark">SRT</div>
    <div>
      <div class="hub-logo-text">SRT Hub</div>
      <div class="hub-logo-sub">Community Research &amp; Discussion</div>
    </div>
  </div>
  <div class="hub-header-right">
    <div id="hub-auth-area"></div>
  </div>
</header>

<!-- New Post Modal -->
<div class="hub-overlay" id="hub-overlay">
  <div class="hub-modal">
    <div class="hub-modal-header">
      <div class="hub-modal-title">New Post</div>
      <button class="hub-modal-close" id="hub-modal-close">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="hub-alert hub-alert-error"   id="modal-error"></div>
    <div class="hub-alert hub-alert-success" id="modal-success"></div>
    <div class="hub-field">
      <label class="hub-label" for="post-title">Title</label>
      <input class="hub-input" id="post-title" type="text" placeholder="Give your post a clear title…">
    </div>
    <div class="hub-field-row">
      <div class="hub-field">
        <label class="hub-label" for="post-category">Category</label>
        <select class="hub-select" id="post-category"></select>
      </div>
      <div class="hub-field">
        <label class="hub-label" for="post-simulant">Simulant (optional)</label>
        <select class="hub-select" id="post-simulant">
          <option value="">None</option>
          <option>LHS-1</option><option>LHS-1E</option><option>LHS-1D</option>
          <option>LMS-1</option><option>LMS-1E</option>
          <option>MGS-1</option><option>MGS-1C</option><option>MGS-1S</option>
          <option>JEZ-1</option><option>CI-E</option><option>CM-E</option>
        </select>
      </div>
    </div>
    <div class="hub-field">
      <label class="hub-label" for="post-body">Content <span style="font-weight:400;text-transform:none;letter-spacing:0">(Markdown supported, you can paste images)</span></label>
      <textarea class="hub-textarea" id="post-body" placeholder="Share your research, notes, or start a discussion…"></textarea>
    </div>
    <div class="hub-modal-actions">
      <button class="btn btn-ghost" id="hub-btn-cancel">Cancel</button>
      <button class="btn btn-primary" id="hub-btn-submit">
        <span id="submit-label">Publish Post</span>
        <span id="submit-spinner" style="display:none"><span class="spinner" style="width:14px;height:14px;border-width:2px"></span></span>
      </button>
    </div>
  </div>
</div>

<main class="hub-main">

  <!-- Feed View -->
  <div class="view active" id="view-feed">
    <div class="hub-controls">
      <div class="hub-search-wrap">
        <svg class="hub-search-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input class="hub-search" id="hub-search" type="text" placeholder="Search posts…">
      </div>
      <div class="hub-cats" id="hub-cats"></div>
    </div>
    <div class="hub-stats" id="hub-stats"></div>
    <div class="hub-list" id="hub-list"></div>
  </div>

  <!-- Post Detail View -->
  <div class="view" id="view-detail">
    <button class="detail-back" id="detail-back">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back to Hub
    </button>
    <div id="detail-content"></div>
  </div>

</main>

<footer class="hub-footer">
  SRT Hub — Community powered by GitHub Discussions
</footer>

<script>
(function () {
  /* ─── Config ─── */
  const REPO_ID    = 'R_kgDOTXasIg';
  const CLIENT_ID  = 'Ov23liuhhZV6Ln2nkFN4';
  const OAUTH_FN   = 'https://srt-database.vercel.app/api/github-oauth';
  const GH_API     = 'https://api.github.com/graphql';
  const DATA_URL   = 'hub-data.json';

  /* ─── State ─── */
  let allDiscussions = [];
  let allCategories  = [];
  let activeCategory = 'all';
  let searchQuery    = '';
  let currentUser    = null;
  let userToken      = localStorage.getItem('srt_gh_token');

  /* ─── Helpers ─── */
  function catSlug(name) { return name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
  function catClass(name) {
    const map = { general:'cat-general', ideas:'cat-ideas', 'show-and-tell':'cat-show-and-tell',
                  'q-a':'cat-q-a', announcements:'cat-announcements', polls:'cat-polls' };
    return map[catSlug(name)] || 'cat-default';
  }
  function stripMd(md) {
    return (md||'').replace(/!\[.*?\]\(.*?\)/g,'').replace(/\[([^\]]+)\]\(.*?\)/g,'$1')
      .replace(/#{1,6}\s+/g,'').replace(/(\*\*|__)(.*?)\1/g,'$2').replace(/(\*|_)(.*?)\1/g,'$2')
      .replace(/`{1,3}[^`]*`{1,3}/g,'').replace(/>\s+/g,'').replace(/[-*+]\s+/g,'')
      .replace(/\n+/g,' ').trim();
  }
  function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }
  function gql(query, variables, token) {
    return fetch(GH_API, {
      method:'POST',
      headers:{ 'Authorization': `Bearer ${token||userToken}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ query, variables })
    }).then(r=>r.json());
  }

  /* ─── Views ─── */
  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  /* ─── Auth ─── */
  async function fetchUser(token) {
    const res = await fetch('https://api.github.com/user', { headers:{ Authorization:`Bearer ${token}` } });
    if (!res.ok) return null;
    return res.json();
  }

  function renderAuth() {
    const el = document.getElementById('hub-auth-area');
    if (currentUser) {
      el.innerHTML = `
        <img class="hub-avatar-sm" src="${currentUser.avatar_url}&s=60" alt="${currentUser.login}" title="${currentUser.login}" id="user-avatar">
        <button class="btn btn-primary btn-sm" id="new-post-btn">
          <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
          New Post
        </button>`;
      document.getElementById('new-post-btn').addEventListener('click', openModal);
      document.getElementById('user-avatar').addEventListener('click', () => {
        if (confirm(`Logged in as @${currentUser.login}. Log out?`)) logout();
      });
    } else {
      el.innerHTML = `<button class="btn btn-ghost btn-sm" id="login-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Login with GitHub
      </button>`;
      document.getElementById('login-btn').addEventListener('click', startOAuth);
    }
  }

  function startOAuth() {
    const state = Math.random().toString(36).slice(2);
    sessionStorage.setItem('oauth_state', state);
    location.href = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&scope=public_repo&state=${state}`;
  }

  async function handleOAuthCallback() {
    const params = new URLSearchParams(location.search);
    const code   = params.get('code');
    const state  = params.get('state');
    if (!code) return;
    if (state !== sessionStorage.getItem('oauth_state')) { history.replaceState({},'',location.pathname); return; }
    sessionStorage.removeItem('oauth_state');
    history.replaceState({},'',location.pathname);

    try {
      const res  = await fetch(OAUTH_FN, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code}) });
      const data = await res.json();
      if (data.access_token) {
        userToken = data.access_token;
        localStorage.setItem('srt_gh_token', userToken);
        currentUser = await fetchUser(userToken);
        renderAuth();
      }
    } catch(e) { console.error('OAuth error', e); }
  }

  function logout() {
    userToken = null;
    currentUser = null;
    localStorage.removeItem('srt_gh_token');
    renderAuth();
  }

  /* ─── Feed ─── */
  function getFiltered() {
    let r = allDiscussions;
    if (activeCategory !== 'all') r = r.filter(d => catSlug(d.category.name) === activeCategory);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      r = r.filter(d => d.title.toLowerCase().includes(q) || (d.body||'').toLowerCase().includes(q) || d.author.login.toLowerCase().includes(q));
    }
    return r;
  }

  function renderCategories() {
    const el = document.getElementById('hub-cats');
    const counts = {};
    allDiscussions.forEach(d => { const k = catSlug(d.category.name); counts[k]=(counts[k]||0)+1; });
    el.innerHTML = `<button class="hub-cat-btn${activeCategory==='all'?' active':''}" data-cat="all">All <span class="hub-stat-val">${allDiscussions.length}</span></button>` +
      allCategories.filter(c => counts[catSlug(c.name)]).map(c => {
        const slug = catSlug(c.name);
        return `<button class="hub-cat-btn${activeCategory===slug?' active':''}" data-cat="${slug}">${c.emoji} ${c.name} <span class="hub-stat-val">${counts[slug]||0}</span></button>`;
      }).join('');
    el.querySelectorAll('.hub-cat-btn').forEach(btn => btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat; renderCategories(); renderFeed();
    }));
  }

  function renderFeed() {
    const filtered = getFiltered();
    document.getElementById('hub-stats').innerHTML = `<span class="hub-stat-val">${filtered.length}</span> post${filtered.length!==1?'s':''}`;
    const listEl = document.getElementById('hub-list');
    if (!filtered.length) {
      listEl.innerHTML = `<div class="hub-empty"><h3>${searchQuery||activeCategory!=='all'?'No posts match your filters':'No posts yet'}</h3><p>${searchQuery||activeCategory!=='all'?'Try a different search or category.':'Be the first to share your research.'}</p></div>`;
      return;
    }
    listEl.innerHTML = filtered.map(d => {
      const labels = (d.labels?.nodes||[]);
      return `<div class="hub-card" data-id="${d.id}" data-number="${d.number}">
        <div class="hub-card-top">
          <img class="hub-avatar" src="${d.author.avatarUrl}&s=64" alt="${d.author.login}" loading="lazy">
          <div class="hub-author-info">
            <div class="hub-author-name">${d.author.login}</div>
            <div class="hub-author-date">${fmtDate(d.createdAt)}</div>
          </div>
          <span class="hub-cat-pill ${catClass(d.category.name)}">${d.category.emoji} ${d.category.name}</span>
        </div>
        <div class="hub-card-title">${d.title}</div>
        ${d.body?`<div class="hub-card-body">${stripMd(d.body)}</div>`:''}
        <div class="hub-card-footer">
          <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
          ${d.comments.totalCount} comment${d.comments.totalCount!==1?'s':''}
          ${labels.length?`<div class="hub-labels">${labels.map(l=>`<span class="hub-label" style="background:#${l.color}22;color:#${l.color};border:1px solid #${l.color}44">${l.name}</span>`).join('')}</div>`:''}
        </div>
      </div>`;
    }).join('');

    listEl.querySelectorAll('.hub-card').forEach(card => card.addEventListener('click', () => openDetail(card.dataset.id)));
  }

  /* ─── Post Detail ─── */
  function openDetail(discussionId) {
    const d = allDiscussions.find(x => x.id === discussionId);
    if (!d) return;
    showView('view-detail');
    renderDetail(d);
  }

  function renderDetail(d) {
    const labels = (d.labels?.nodes||[]);
    const comments = d.comments?.nodes || [];
    const commentHtml = comments.map(c => `
      <div class="comment">
        <img class="hub-avatar" src="${c.author.avatarUrl}&s=64" alt="${c.author.login}" loading="lazy">
        <div class="comment-body">
          <div class="comment-meta"><strong>${c.author.login}</strong> &middot; ${fmtDate(c.createdAt)}</div>
          <div class="comment-text">${marked.parse(c.body||'')}</div>
        </div>
      </div>`).join('');

    const commentFormHtml = currentUser
      ? `<div class="comment-form">
          <div class="comment-form-title">Leave a comment</div>
          <textarea class="comment-textarea" id="comment-input" placeholder="Write a comment… Markdown supported"></textarea>
          <div class="hub-alert hub-alert-error" id="comment-error"></div>
          <div class="comment-form-footer">
            <button class="btn btn-primary btn-sm" id="comment-submit">
              <span id="comment-label">Post Comment</span>
              <span id="comment-spinner" style="display:none"><span class="spinner" style="width:12px;height:12px;border-width:2px"></span></span>
            </button>
          </div>
        </div>`
      : `<div class="login-prompt">
          <span>Log in to leave a comment</span>
          <button class="btn btn-primary btn-sm" onclick="document.getElementById('login-btn')?.click()||startOAuth()">Login with GitHub</button>
        </div>`;

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-header">
        <div class="detail-meta">
          <img class="hub-avatar" src="${d.author.avatarUrl}&s=64" alt="${d.author.login}">
          <div class="detail-author-info">
            <div class="hub-author-name">${d.author.login}</div>
            <div class="hub-author-date">${fmtDate(d.createdAt)}</div>
          </div>
          <span class="hub-cat-pill ${catClass(d.category.name)}">${d.category.emoji} ${d.category.name}</span>
        </div>
        <div class="detail-title">${d.title}</div>
        ${labels.length?`<div class="detail-labels">${labels.map(l=>`<span class="hub-label" style="background:#${l.color}22;color:#${l.color};border:1px solid #${l.color}44">${l.name}</span>`).join('')}</div>`:''}
      </div>
      <div class="detail-body">${marked.parse(d.body||'')}</div>
      <div class="comments-section">
        <div class="comments-heading">${comments.length} Comment${comments.length!==1?'s':''}</div>
        ${commentHtml}
        ${commentFormHtml}
      </div>`;

    if (currentUser) {
      document.getElementById('comment-submit').addEventListener('click', () => submitComment(d));
    }
  }

  async function submitComment(discussion) {
    const body = document.getElementById('comment-input').value.trim();
    const errEl = document.getElementById('comment-error');
    errEl.style.display = 'none';
    if (!body) return;

    const submitBtn = document.getElementById('comment-submit');
    document.getElementById('comment-label').style.display  = 'none';
    document.getElementById('comment-spinner').style.display = 'inline';
    submitBtn.disabled = true;

    const MUTATION = `mutation($id:ID!,$body:String!){addDiscussionComment(input:{discussionId:$id,body:$body}){comment{id body author{login avatarUrl}createdAt}}}`;
    const res = await gql(MUTATION, { id: discussion.id, body });

    document.getElementById('comment-label').style.display  = 'inline';
    document.getElementById('comment-spinner').style.display = 'none';
    submitBtn.disabled = false;

    if (res.errors) { errEl.textContent = res.errors[0].message; errEl.style.display='block'; return; }

    const comment = res.data.addDiscussionComment.comment;
    // Add to local state
    if (!discussion.comments) discussion.comments = { totalCount:0, nodes:[] };
    discussion.comments.nodes.push(comment);
    discussion.comments.totalCount++;
    document.getElementById('comment-input').value = '';
    renderDetail(discussion);
  }

  /* ─── New Post Modal ─── */
  const overlay = document.getElementById('hub-overlay');

  function openModal() {
    if (!currentUser) { startOAuth(); return; }
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('modal-error').style.display   = 'none';
    document.getElementById('modal-success').style.display = 'none';
    document.getElementById('post-title').value = '';
    document.getElementById('post-body').value  = '';
  }
  function closeModal() { overlay.classList.remove('open'); document.body.style.overflow = ''; }

  document.getElementById('hub-modal-close').addEventListener('click', closeModal);
  document.getElementById('hub-btn-cancel').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target===overlay) closeModal(); });

  document.getElementById('hub-btn-submit').addEventListener('click', async () => {
    const title    = document.getElementById('post-title').value.trim();
    const body     = document.getElementById('post-body').value.trim();
    const catEl    = document.getElementById('post-category');
    const catId    = catEl.value;
    const simulant = document.getElementById('post-simulant').value;
    const errEl    = document.getElementById('modal-error');
    const sucEl    = document.getElementById('modal-success');

    errEl.style.display = 'none'; sucEl.style.display = 'none';
    if (!title) { errEl.textContent='Please add a title.'; errEl.style.display='block'; return; }
    if (!catId) { errEl.textContent='Please select a category.'; errEl.style.display='block'; return; }

    document.getElementById('submit-label').style.display  = 'none';
    document.getElementById('submit-spinner').style.display = 'inline';
    document.getElementById('hub-btn-submit').disabled = true;

    const fullBody = simulant ? `**Simulant:** ${simulant}\n\n${body}` : body;
    const MUTATION = `mutation($repoId:ID!,$catId:ID!,$title:String!,$body:String!){createDiscussion(input:{repositoryId:$repoId,categoryId:$catId,title:$title,body:$body}){discussion{id number title body author{login avatarUrl}category{name emoji slug}labels(first:10){nodes{name color}}comments{totalCount nodes{id body author{login avatarUrl}createdAt}}createdAt url}}}`;
    const res = await gql(MUTATION, { repoId:REPO_ID, catId, title, body:fullBody });

    document.getElementById('submit-label').style.display  = 'inline';
    document.getElementById('submit-spinner').style.display = 'none';
    document.getElementById('hub-btn-submit').disabled = false;

    if (res.errors) { errEl.textContent=res.errors[0].message; errEl.style.display='block'; return; }

    const newPost = res.data.createDiscussion.discussion;
    allDiscussions.unshift(newPost);
    sucEl.textContent = 'Post published!';
    sucEl.style.display = 'block';
    setTimeout(() => { closeModal(); renderCategories(); renderFeed(); showView('view-feed'); }, 1200);
  });

  /* ─── Init ─── */
  document.getElementById('detail-back').addEventListener('click', () => showView('view-feed'));
  document.getElementById('hub-logo').addEventListener('click',    () => showView('view-feed'));
  document.getElementById('hub-search').addEventListener('input', e => { searchQuery=e.target.value; renderFeed(); });

  async function init() {
    // Handle OAuth callback first
    await handleOAuthCallback();

    // Load user if token exists
    if (userToken && !currentUser) {
      currentUser = await fetchUser(userToken);
      if (!currentUser) { userToken=null; localStorage.removeItem('srt_gh_token'); }
    }
    renderAuth();

    // Load feed data
    const data = await fetch(DATA_URL).then(r=>r.json()).catch(()=>({discussions:[],categories:[]}));
    allDiscussions = data.discussions || [];
    allCategories  = data.categories  || [];

    // Populate category dropdown
    document.getElementById('post-category').innerHTML =
      '<option value="">Select category…</option>' +
      allCategories.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');

    renderCategories();
    renderFeed();
  }

  init();
})();
</script>
</body>
</html>
